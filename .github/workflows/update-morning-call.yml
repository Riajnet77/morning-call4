name: Morning Call — Atualização Diária

on:
  schedule:
    # Roda de segunda a sexta às 7h30 (horário de Brasília = 10h30 UTC)
    - cron: '30 10 * * 1-5'
  workflow_dispatch: # permite rodar manualmente no GitHub Actions

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências Python
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Executar scraper
        env:
          TRADERBI_EMAIL: ${{ secrets.TRADERBI_EMAIL }}
          TRADERBI_PASSWORD: ${{ secrets.TRADERBI_PASSWORD }}
        run: python scrape.py

      - name: Upload debug (se houver falha)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: |
            debug_*.png
            debug_*.html
          if-no-files-found: ignore

      - name: Commit e push do data.json atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "Nenhuma mudança no data.json — nada a commitar."
          else
            git commit -m "auto: morning call $(date +'%d/%m/%Y %H:%M') [skip ci]"
            git push
          fi
