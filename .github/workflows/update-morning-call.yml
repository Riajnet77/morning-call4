name: Morning Call — Atualização Diária

on:
  schedule:
    # Roda às 9h00 BRT (12h00 UTC) — após abertura do mercado brasileiro
    - cron: '0 12 * * 1-5'
    # Segunda execução às 10h30 BRT (13h30 UTC) com dados mais frescos
    - cron: '30 13 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests feedparser beautifulsoup4

      - name: Executar scraper
        run: python scrape.py

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Força commit mesmo se só o timestamp mudou
          git commit -m "auto: morning call $(date +'%d/%m/%Y %H:%M') [skip ci]" || echo "Nada a commitar"
          git push || echo "Push falhou"
