<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morning Call · Juniorwuttke</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(circle at 10% 20%, #0a0f1e, #03060c);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            color: #eef2ff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #fff, #3b82f6, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .card {
            background: rgba(15, 25, 45, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .card h2 {
            margin-bottom: 15px;
            font-size: 1.4rem;
            color: #38bdf8;
        }
        .grafico iframe {
            width: 100%;
            height: 400px;
            border-radius: 16px;
            border: none;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.8rem;
            color: #6c86a3;
        }
        @media (max-width: 800px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📈 Morning Call · Juniorwuttke</h1>
        <p>Feed automático do TradingView | Atualizado em tempo real</p>
    </div>

    <div class="grid">
        <!-- Gráfico da NVDA (seu link) -->
        <div class="card grafico">
            <h2>📊 Análise Técnica · NVDA</h2>
            <iframe src="https://br.tradingview.com/chart/NVDA/1EviiEpc/?embed=1" allowtransparency="true" scrolling="no"></iframe>
        </div>

        <!-- Widget oficial do TradingView que mostra as postagens do perfil Juniorwuttke -->
        <div class="card">
            <h2>📰 Últimas publicações</h2>
            <!-- CÓDIGO DO WIDGET - mostra automaticamente os posts do perfil -->
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                {
                  "feedMode": "user",
                  "username": "Juniorwuttke",
                  "colorTheme": "dark",
                  "isTransparent": false,
                  "showHeader": true,
                  "showFeaturedReviews": false,
                  "width": "100%",
                  "height": 450,
                  "locale": "br"
                }
                </script>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>Conteúdo gerado automaticamente a partir do perfil Juniorwuttke no TradingView.</p>
        <p>⏱️ Atualização em tempo real conforme novas publicações.</p>
    </div>
</div>
</body>
</html>
