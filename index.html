<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Call</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;line-height:1.6;padding:20px}
.container{max-width:1200px;margin:0 auto}
.header{text-align:center;margin-bottom:30px;padding:20px;background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);border-radius:12px;border:1px solid #334155}
.header h1{font-size:2.5rem;background:linear-gradient(90deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.header .date{color:#94a3b8;font-size:1.1rem}
.tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:15px}
.tag{padding:6px 14px;border-radius:20px;font-size:.85rem;font-weight:500}
.tag-altista{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.tag-baixista{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)}
.tag-neutro{background:rgba(148,163,184,.15);color:#cbd5e1;border:1px solid rgba(148,163,184,.3)}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:30px}
.card{background:#1e293b;border-radius:12px;padding:20px;border:1px solid #334155;transition:transform .2s}
.card:hover{transform:translateY(-2px)}
.card-label{font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;margin-bottom:8px}
.card-value{font-size:1.8rem;font-weight:700;margin-bottom:4px}
.card-change{font-size:.9rem;font-weight:500}
.positive{color:#4ade80}
.negative{color:#f87171}
.neutral{color:#cbd5e1}
.section{background:#1e293b;border-radius:12px;padding:25px;margin-bottom:20px;border:1px solid #334155}
.section h2{font-size:1.3rem;margin-bottom:15px;color:#f8fafc;border-bottom:2px solid #334155;padding-bottom:10px}
.section p{white-space:pre-line;color:#cbd5e1;line-height:1.8}
.section ul{list-style:none;padding:0}
.section li{padding:8px 0;border-bottom:1px solid #334155;color:#cbd5e1}
.section li:last-child{border-bottom:none}
.tv-section{background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);border:1px solid #475569}
.tv-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:15px;margin-top:15px}
.tv-card{background:#0f172a;border-radius:10px;padding:18px;border:1px solid #334155}
.tv-card h3{font-size:1rem;color:#f8fafc;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.tv-mercado{font-size:.75rem;padding:4px 10px;border-radius:12px;font-weight:600}
.tv-mercado-b3{background:rgba(34,197,94,.15);color:#4ade80}
.tv-mercado-eua{background:rgba(96,165,250,.15);color:#60a5fa}
.tv-mercado-crypto{background:rgba(168,85,247,.15);color:#a78bfa}
.tv-ativo{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1e293b}
.tv-ativo:last-child{border-bottom:none}
.tv-ticker{font-weight:600;color:#f8fafc}
.tv-score{font-size:.85rem;padding:4px 10px;border-radius:8px;font-weight:600}
.score-compra{background:rgba(34,197,94,.2);color:#4ade80}
.score-venda{background:rgba(239,68,68,.2);color:#f87171}
.score-neutro{background:rgba(148,163,184,.2);color:#cbd5e1}
.tv-indicadores{font-size:.8rem;color:#94a3b8;margin-top:4px}
.tv-sentimento{text-align:center;padding:15px;background:#0f172a;border-radius:10px;margin-top:15px;border:1px solid #334155}
.tv-sentimento-label{font-size:.85rem;color:#94a3b8;margin-bottom:8px}
.tv-sentimento-valor{font-size:1.5rem;font-weight:700}
.tv-aviso{background:rgba(234,179,8,.1);border:1px solid rgba(234,179,8,.3);color:#fbbf24;padding:15px;border-radius:10px;text-align:center;margin-top:15px}
@media(max-width:768px){.header h1{font-size:1.8rem}.cards-grid{grid-template-columns:repeat(2,1fr)}.tv-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
  <div id="app">Carregando Morning Call...</div>
</div>
<script>
async function loadData(){
  try{
    const res=await fetch('data.json?t='+Date.now());
    const data=await res.json();
    render(data);
  }catch(e){
    document.getElementById('app').innerHTML='<div class="section"><h2>Erro</h2><p>Não foi possível carregar o Morning Call. Tente novamente mais tarde.</p></div>';
  }
}

function render(data){
  const app=document.getElementById('app');

  // Header
  let html=`<div class="header">
    <h1>${data.title||'Morning Call'}</h1>
    <div class="date">${data.lastUpdate||''}</div>
    <div class="tags">`;

  (data.tags||[]).forEach(tag=>{
    let cls='tag-neutro';
    if(tag.includes('Baixista'))cls='tag-baixista';
    else if(tag.includes('Altista'))cls='tag-altista';
    html+=`<span class="tag ${cls}">${tag}</span>`;
  });
  html+=`</div></div>`;

  // Cards de indicadores
  const ind=data.indicators||{};
  html+=`<div class="cards-grid">
    <div class="card"><div class="card-label">Fear & Greed</div><div class="card-value" style="color:${getFGColor(ind.fearGreed)}">${ind.fearGreed??'-'}</div><div class="card-change">${ind.fearGreedLabel||''}</div></div>
    <div class="card"><div class="card-label">DXY</div><div class="card-value">${fmt(ind.dxy)}</div><div class="card-change ${ind.dxyChange>=0?'positive':'negative'}">${fmtChange(ind.dxyChange)}</div></div>
    <div class="card"><div class="card-label">VIX</div><div class="card-value">${fmt(ind.vix)}</div><div class="card-change ${ind.vixChange>=0?'negative':'positive'}">${fmtChange(ind.vixChange)}</div></div>
    <div class="card"><div class="card-label">IBOV</div><div class="card-value">${fmt(ind.ibov,0)}</div><div class="card-change ${ind.ibovChange>=0?'positive':'negative'}">${fmtChange(ind.ibovChange)}</div></div>
    <div class="card"><div class="card-label">USD/BRL</div><div class="card-value">R$ ${fmt(ind.usdbrl)}</div><div class="card-change ${ind.usdbrlChange>=0?'negative':'positive'}">${fmtChange(ind.usdbrlChange)}</div></div>
    <div class="card"><div class="card-label">BTC</div><div class="card-value">$${fmt(ind.btc,0)}</div><div class="card-change ${ind.btcChange>=0?'positive':'negative'}">${fmtChange(ind.btcChange)}</div></div>
  </div>`;

  // Seção TradingView
  html+=renderTradingView(data);

  // Insights
  (data.insights||[]).forEach(insight=>{
    const parts=insight.split('\n');
    const title=parts[0].replace(/\*\*/g,'');
    const content=parts.slice(1).join('\n');
    html+=`<div class="section"><h2>${title}</h2><p>${content}</p></div>`;
  });

  // Agenda
  if(data.agenda&&data.agenda.length){
    html+=`<div class="section"><h2>Agenda do Dia</h2><ul>`;
    data.agenda.forEach(ev=>{
      html+=`<li><strong>${ev.time}</strong> — ${ev.event}</li>`;
    });
    html+=`</ul></div>`;
  }

  app.innerHTML=html;
}

function renderTradingView(data){
  const tv=data.tradingview_indicators;
  if(!tv||!tv.mercados){
    return `<div class="section tv-section">
      <h2>Análise Técnica — TradingView</h2>
      <div class="tv-aviso">Indicadores técnicos não disponíveis nesta execução. Verifique se o workflow rodou corretamente.</div>
    </div>`;
  }

  let html=`<div class="section tv-section">
    <h2>Análise Técnica — TradingView</h2>
    <div class="tv-grid">`;

  const mercados={b3:'B3',eua:'EUA',crypto:'Cripto'};
  const mercadoClasses={b3:'tv-mercado-b3',eua:'tv-mercado-eua',crypto:'tv-mercado-crypto'};

  Object.entries(tv.mercados||{}).forEach(([key,m])=>{
    if(!m||!m.ativos)return;
    const ativosOk=m.ativos.filter(a=>a.status==='ok');
    if(!ativosOk.length)return;

    html+=`<div class="tv-card">
      <h3><span class="tv-mercado ${mercadoClasses[key]||'tv-mercado-b3'}">${mercados[key]||key.toUpperCase()}</span> ${m.nome||''}</h3>`;

    ativosOk.slice(0,5).forEach(a=>{
      const score=a.score_tecnico||0;
      let scoreCls='score-neutro';
      let scoreTxt=a.recomendacao||'NEUTRO';
      if(a.classe==='altista'){scoreCls='score-compra';}
      else if(a.classe==='baixista'){scoreCls='score-venda';}

      html+=`<div class="tv-ativo">
        <div>
          <div class="tv-ticker">${a.ticker}</div>
          <div class="tv-indicadores">RSI:${a.indicadores?.rsi?.valor??'-'} | Stoch:${a.indicadores?.stochastic?.k??'-'} | MACD:${a.indicadores?.macd?.macd?.toFixed(3)??'-'}</div>
        </div>
        <span class="tv-score ${scoreCls}">${scoreTxt}</span>
      </div>`;
    });

    // Sentimento
    const sent=m.resumo?.sentimento_geral||'NEUTRO';
    const sentColor=sent.includes('ALTA')?'#4ade80':sent.includes('BAIXA')?'#f87171':'#cbd5e1';
    html+=`<div class="tv-sentimento">
      <div class="tv-sentimento-label">Sentimento</div>
      <div class="tv-sentimento-valor" style="color:${sentColor}">${sent}</div>
    </div>`;

    html+=`</div>`;
  });

  html+=`</div></div>`;
  return html;
}

function fmt(v,d=2){if(v==null)return'-';return v.toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d})}
function fmtChange(v){if(v==null)return'-';return(v>=0?'+':'')+v.toFixed(2)+'%'}
function getFGColor(v){if(v==null)return'#cbd5e1';if(v<=20)return'#f87171';if(v<=40)return'#fb923c';if(v<=60)return'#cbd5e1';if(v<=80)return'#4ade80';return'#22c55e'}

loadData();
</script>
</body>
</html>
