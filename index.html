<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Call</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #09090b;
    --surface: #111113;
    --surface2: #18181b;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --txt: #e4e4e7;
    --txt2: #71717a;
    --txt3: #52525b;
    --gold: #d4a853;
    --gold2: #f5c96a;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #60a5fa;
    --mono: 'IBM Plex Mono', monospace;
    --display: 'Syne', sans-serif;
    --body: 'Inter', sans-serif;
  }

  body {
    font-family: var(--body);
    background: var(--bg);
    color: var(--txt);
    min-height: 100vh;
    padding: 0;
    line-height: 1.6;
  }

  /* ── TOPO ── */
  .topo {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    background: rgba(9,9,11,0.92);
    backdrop-filter: blur(12px);
    z-index: 10;
  }
  .topo-esq { display: flex; align-items: center; gap: 16px; }
  .logo-badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--gold);
    background: rgba(212,168,83,0.1);
    border: 1px solid rgba(212,168,83,0.25);
    padding: 4px 10px;
    border-radius: 4px;
    text-transform: uppercase;
  }
  .topo-titulo {
    font-family: var(--display);
    font-size: 18px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.02em;
  }
  .topo-dir { display: flex; align-items: center; gap: 20px; }
  .clock {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--txt2);
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── LAYOUT ── */
  .wrapper {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 32px 80px;
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 32px;
  }
  @media(max-width: 860px){
    .wrapper { grid-template-columns: 1fr; padding: 24px 20px 60px; }
  }

  /* ── HERO ── */
  .hero {
    grid-column: 1 / -1;
    border-bottom: 1px solid var(--border);
    padding-bottom: 32px;
    margin-bottom: 8px;
  }
  .hero-data {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--txt3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .hero-h1 {
    font-family: var(--display);
    font-size: clamp(36px, 5vw, 58px);
    font-weight: 800;
    line-height: 1.0;
    letter-spacing: -0.03em;
    color: #fff;
    margin-bottom: 16px;
  }
  .hero-h1 span { color: var(--gold); }
  .hero-sub {
    font-size: 14px;
    color: var(--txt2);
    font-family: var(--mono);
  }

  .vies-badge {
    display: inline-block;
    margin-top: 14px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid;
  }
  .vies-altista  { color: #86efac; background: rgba(34,197,94,0.1);  border-color: rgba(34,197,94,0.3); }
  .vies-baixista { color: #fca5a5; background: rgba(239,68,68,0.1);  border-color: rgba(239,68,68,0.3); }
  .vies-neutro   { color: #fcd34d; background: rgba(252,211,77,0.1); border-color: rgba(252,211,77,0.3); }

  .feriado-aviso {
    margin-top: 14px;
    display: inline-block;
    font-size: 13px;
    color: #fcd34d;
    background: rgba(252,211,77,0.08);
    border: 1px solid rgba(252,211,77,0.2);
    border-radius: 6px;
    padding: 8px 14px;
    font-family: var(--mono);
  }

  /* ── SECTION TITLE ── */
  .sec-title {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--txt3);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sec-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── CARD BASE ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 22px;
  }

  /* ── INDICADORES ── */
  .indicadores-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 32px;
    grid-column: 1 / -1;
  }
  .ind-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
  }
  .ind-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .ind-card.fg::before { background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); }
  .ind-card.dxy::before { background: var(--blue); }
  .ind-card.vix::before { background: var(--red); }
  .ind-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--txt3);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .ind-valor {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 600;
    color: #fff;
    line-height: 1;
  }
  .ind-desc {
    font-size: 11px;
    color: var(--txt3);
    margin-top: 4px;
  }
  @media(max-width: 600px){
    .indicadores-grid { grid-template-columns: 1fr; }
  }

  /* ── TAGS (SUPORTES / RESISTÊNCIAS) ── */
  .tags-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 32px;
    grid-column: 1 / -1;
  }
  .tag {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid;
  }
  .tag.resistencia {
    color: #fca5a5;
    background: rgba(239,68,68,0.08);
    border-color: rgba(239,68,68,0.2);
  }
  .tag.suporte {
    color: #86efac;
    background: rgba(34,197,94,0.08);
    border-color: rgba(34,197,94,0.2);
  }
  .tag.neutro {
    color: var(--txt2);
    background: var(--surface2);
    border-color: var(--border);
  }

  /* ── COLUNA PRINCIPAL: INSIGHTS ── */
  .col-main {}
  .insights-texto {
    font-size: 15px;
    line-height: 1.8;
    color: #d4d4d8;
  }
  .insights-texto p {
    margin-bottom: 18px;
  }
  .insights-texto p:last-child { margin-bottom: 0; }

  /* ── COLUNA LATERAL ── */
  .col-side { display: flex; flex-direction: column; gap: 20px; }

  /* ── ESTRATÉGIA ── */
  .estrategia-card {
    background: rgba(212,168,83,0.05);
    border: 1px solid rgba(212,168,83,0.15);
    border-radius: 10px;
    padding: 20px 22px;
  }
  .estrategia-txt {
    font-size: 14px;
    line-height: 1.7;
    color: #d4c9a8;
  }

  /* ── AGENDA ── */
  .agenda-lista { display: flex; flex-direction: column; gap: 0; }
  .agenda-item {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .agenda-item:last-child { border-bottom: none; padding-bottom: 0; }
  .agenda-hora {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--gold);
    min-width: 48px;
    padding-top: 1px;
  }
  .agenda-evento {
    font-size: 13px;
    color: var(--txt);
    line-height: 1.5;
  }

  /* ── ATUALIZAÇÃO ── */
  .insight-secao {
    margin-bottom: 28px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .insight-secao:last-child { border-bottom: none; margin-bottom: 0; }
  .insight-titulo {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
  }
  .insight-corpo {
    font-size: 15px;
    line-height: 1.8;
    color: #d4d4d8;
  }
  .insight-corpo p { margin-bottom: 10px; }
  .insight-corpo p:last-child { margin-bottom: 0; }
  .insight-corpo ul { color: #d4d4d8; }
  .insight-corpo li { margin-bottom: 6px; }

  .update-bar {
    grid-column: 1 / -1;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--txt3);
    flex-wrap: wrap;
    gap: 8px;
  }
  .scrape-badge {
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
  }
  .scrape-ok { background: rgba(34,197,94,0.1); color: #86efac; border: 1px solid rgba(34,197,94,0.2); }
  .scrape-fail { background: rgba(239,68,68,0.1); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); }

  /* ── ERRO ── */
  .erro-box {
    grid-column: 1 / -1;
    background: rgba(239,68,68,0.06);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 10px;
    padding: 20px 24px;
    color: #fca5a5;
    font-size: 14px;
  }

  /* ── LOADING ── */
  .loading {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 0;
    color: var(--txt3);
    font-family: var(--mono);
    font-size: 13px;
  }
</style>
</head>
<body>

<header class="topo">
  <div class="topo-esq">
    <span class="logo-badge">TraderBI</span>
    <span class="topo-titulo" id="topo-titulo">Morning Call</span>
  </div>
  <div class="topo-dir">
    <div class="status-dot" id="status-dot" style="display:none"></div>
    <span class="clock" id="clock">--:--:--</span>
  </div>
</header>

<div class="wrapper" id="wrapper">
  <div class="loading" id="loading">Carregando morning call...</div>
</div>

<script>
// ── RELÓGIO ──────────────────────────────────────────────────────────────────
function tick() {
  const agora = new Date();
  const opts = { timeZone: 'America/Sao_Paulo', hour: '2-digit', minute: '2-digit', second: '2-digit' };
  document.getElementById('clock').textContent = agora.toLocaleTimeString('pt-BR', opts) + ' BRT';
}
setInterval(tick, 1000);
tick();

// ── LIMPEZA DE TEXTO ──────────────────────────────────────────────────────────
function limparRodape(texto) {
  const cortes = [/Copyright\s*©/i, /Todos os direitos reservados/i, /TradingView/i, /FactSet/i, /Política de Privacidade/i, /© 20\d\d/i];
  for (const re of cortes) {
    const idx = texto.search(re);
    if (idx > -1) texto = texto.substring(0, idx).trim();
  }
  return texto;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function chg(v) {
  if (v === null || v === undefined) return '';
  const n = parseFloat(v);
  const cor = n >= 0 ? 'var(--green)' : 'var(--red)';
  const sinal = n >= 0 ? '▲' : '▼';
  return `<span style="font-size:12px;color:${cor};margin-left:6px">${sinal} ${Math.abs(n).toFixed(2)}%</span>`;
}

function renderIndicadores(ind) {
  const fg = ind?.fearGreed;
  const dxy = ind?.dxy;
  const vix = ind?.vix;
  const ibov = ind?.ibov;
  const usd = ind?.usdbrl;
  return `
    <div class="indicadores-grid" style="grid-template-columns:repeat(5,1fr)">
      <div class="ind-card fg">
        <div class="ind-label">Fear &amp; Greed</div>
        <div class="ind-valor">${fg ?? '—'}</div>
        <div class="ind-desc">${ind?.fearGreedLabel || (fg !== null && fg !== undefined ? (fg < 25 ? 'Medo extremo' : fg < 45 ? 'Medo' : fg < 55 ? 'Neutro' : fg < 75 ? 'Ganância' : 'Ganância extrema') : 'Indisponível')}</div>
      </div>
      <div class="ind-card dxy">
        <div class="ind-label">DXY${chg(ind?.dxyChange)}</div>
        <div class="ind-valor">${dxy ?? '—'}</div>
        <div class="ind-desc">Índice do dólar</div>
      </div>
      <div class="ind-card vix">
        <div class="ind-label">VIX${chg(ind?.vixChange)}</div>
        <div class="ind-valor">${vix ?? '—'}</div>
        <div class="ind-desc">${vix ? (parseFloat(vix) < 15 ? 'Baixa volatilidade' : parseFloat(vix) < 25 ? 'Vol. moderada' : 'Alta volatilidade') : 'Indisponível'}</div>
      </div>
      <div class="ind-card" style="--bar:var(--green)">
        <div class="ind-label">IBOV${chg(ind?.ibovChange)}</div>
        <div class="ind-valor" style="font-size:20px">${ibov ? Math.round(ibov).toLocaleString('pt-BR') : '—'}</div>
        <div class="ind-desc">Ibovespa</div>
      </div>
      <div class="ind-card" style="--bar:var(--gold)">
        <div class="ind-label">USD/BRL${chg(ind?.usdbrlChange)}</div>
        <div class="ind-valor">R$ ${usd ? parseFloat(usd).toFixed(2) : '—'}</div>
        <div class="ind-desc">Dólar comercial</div>
      </div>
    </div>`;
}

function renderTags(tags, tagsTipados) {
  if (!tags || tags.length === 0) return '';
  const tipados = tagsTipados || [];
  const html = tags.map((tag, i) => {
    const tipo = tipados[i]?.tipo || (tag.toLowerCase().includes('resist') ? 'resistencia' : tag.toLowerCase().includes('suport') ? 'suporte' : 'neutro');
    return `<span class="tag ${tipo}">${tag}</span>`;
  }).join('');
  return `<div class="tags-wrap">${html}</div>`;
}

function renderAgenda(agenda) {
  if (!agenda || agenda.length === 0) {
    return '<p style="color:var(--txt3);font-size:13px;">Nenhum evento registrado para hoje.</p>';
  }
  return `<div class="agenda-lista">` + agenda.map(a =>
    `<div class="agenda-item">
      <span class="agenda-hora">${a.time}</span>
      <span class="agenda-evento">${a.event}</span>
    </div>`
  ).join('') + '</div>';
}

function renderInsights(insights) {
  if (!insights || insights.length === 0) return '<p style="color:var(--txt3)">Sem conteúdo disponível.</p>';
  return insights.map(p => {
    const limpo = limparRodape(p);
    if (!limpo) return '';
    // Detecta seção com título **TÍTULO**
conteudo
    const match = limpo.match(/^\*\*([^*]+)\*\*
([\s\S]+)/);
    if (match) {
      const titulo = match[1];
      const corpo = match[2].trim()
        .split('\n')
        .map(linha => linha.startsWith('•') ? `<li>${linha.slice(1).trim()}</li>` : `<span>${linha}</span>`)
        .join('\n');
      const temLi = corpo.includes('<li>');
      const corpofmt = temLi
        ? `<ul style="padding-left:18px;margin:8px 0">${corpo}</ul>`
        : corpo.split('<span>').filter(Boolean).map(s => `<p>${s.replace('</span>','')}</p>`).join('');
      return `<div class="insight-secao">
        <div class="insight-titulo">${titulo}</div>
        <div class="insight-corpo">${corpofmt}</div>
      </div>`;
    }
    return `<p>${limpo}</p>`;
  }).filter(Boolean).join('');
}

// ── MAIN ──────────────────────────────────────────────────────────────────────
async function carregar() {
  try {
    const resp = await fetch('data.json?t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const d = await resp.json();

    document.getElementById('topo-titulo').textContent = d.title || 'Morning Call';
    document.getElementById('status-dot').style.display = 'block';

    const wrapper = document.getElementById('wrapper');

    if (!d.scrape_ok && d.insights?.[0]?.startsWith('⚠️')) {
      wrapper.innerHTML = `
        <div class="hero" style="grid-column:1/-1">
          <div class="hero-data">${d.date || ''}</div>
          <h1 class="hero-h1">Morning <span>Call</span></h1>
        </div>
        <div class="erro-box">
          ⚠️ Falha na coleta automática de hoje.<br>
          <small style="opacity:0.7">Verifique os logs do GitHub Actions. Última atualização: ${d.lastUpdate}</small>
        </div>`;
      return;
    }

    wrapper.innerHTML = `
      <!-- HERO -->
      <div class="hero">
        <div class="hero-data">📅 ${d.date} &nbsp;·&nbsp; Mapeamento de Fluxo Operacional</div>
        <h1 class="hero-h1">Morning <span>Call</span></h1>
        <div class="hero-sub">Atualizado às ${d.lastUpdate?.split(' ')[1] || '--'} &nbsp;·&nbsp; Análise gerada por IA</div>
        ${d.vies ? `<div class="vies-badge vies-${d.vies.toLowerCase()}">${d.vies === 'Altista' ? '▲' : d.vies === 'Baixista' ? '▼' : '●'} VIÉS ${d.vies.toUpperCase()}</div>` : ''}
        ${d.feriado_aviso ? `<div class="feriado-aviso">🗓️ ${d.feriado_aviso}</div>` : ''}
      </div>

      <!-- INDICADORES -->
      ${renderIndicadores(d.indicators)}

      <!-- TAGS -->
      ${d.tags?.length > 0 ? `
        <div style="grid-column:1/-1">
          <div class="sec-title">Zonas de liquidez mapeadas</div>
          ${renderTags(d.tags, d.tags_tipados)}
        </div>` : ''}

      <!-- COLUNA PRINCIPAL: INSIGHTS -->
      <div class="col-main">
        <div class="sec-title">Análise do pregão</div>
        <div class="insights-texto" id="insights-box"></div>
      </div>

      <!-- COLUNA LATERAL -->
      <div class="col-side">

        ${d.strategy ? `
        <div>
          <div class="sec-title">Direcionamento estratégico</div>
          <div class="estrategia-card">
            <div class="estrategia-txt">${d.strategy}</div>
          </div>
        </div>` : ''}

        <div>
          <div class="sec-title">Agenda econômica</div>
          <div class="card">
            ${renderAgenda(d.agenda)}
          </div>
        </div>
      </div>

      <!-- RODAPÉ -->
      <div class="update-bar">
        <span>Última coleta: ${d.lastFetch}</span>
        <span>Fonte: TraderBI · Aquecimento do Pregão</span>
        <span class="scrape-badge ${d.scrape_ok ? 'scrape-ok' : 'scrape-fail'}">${d.scrape_ok ? 'COLETA OK' : 'COLETA PARCIAL'}</span>
      </div>`;

    // Insere insights depois do render para evitar XSS acidental via innerText
    document.getElementById('insights-box').innerHTML = renderInsights(d.insights);

  } catch (err) {
    document.getElementById('wrapper').innerHTML =
      `<div class="erro-box" style="grid-column:1/-1">Erro ao carregar data.json: ${err.message}</div>`;
  }
}

carregar();
</script>
</body>
</html>
