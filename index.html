<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morning Call - TraderBI</title>
    <style>
        :root { 
            --bg-principal: #090d16; --bg-card: #111827;
            --texto-claro: #f3f4f6; --texto-mutado: #9ca3af; 
            --azul-trade: #38bdf8; --borda: #1f2937; 
        }
        body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--bg-principal); color: var(--texto-claro); margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 950px; margin: auto; background: var(--bg-card); padding: 35px; border-radius: 12px; border: 1px solid var(--borda); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        header { border-bottom: 1px solid var(--borda); padding-bottom: 20px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        h1 { color: var(--azul-trade); font-size: 24px; margin: 0; font-weight: 800; }
        .timestamp { font-size: 12px; background: #090d16; padding: 8px 14px; border-radius: 6px; border: 1px solid var(--borda); color: var(--azul-trade); font-family: monospace; }
        .conteudo-traderbi { font-size: 15px; color: #e5e7eb; white-space: pre-wrap; word-wrap: break-word; text-align: justify; }
        .erro-mensagem { color: #ef4444; background: rgba(239, 68, 68, 0.1); padding: 15px; border-radius: 6px; border: 1px solid rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div>
            <h1>🌅 Aquecimento do Pregão</h1>
            <div style="color: var(--texto-mutado); font-size: 13px; margin-top: 4px;">Painel de Análise Integrado • TraderBI</div>
        </div>
        <div class="timestamp" id="live-clock">Carregando Relógio...</div>
    </header>

    <!-- O JAVASCRIPT VAI INJETAR O CONTEÚDO INTEGRAL DO DATA.JSON AQUI DENTRO -->
    <div id="conteudo-dinamico" class="conteudo-traderbi">
        <p style="color: var(--texto-mutado);">Carregando dados atualizados do mercado...</p>
    </div>
</div>

<script>
    // 1. Relógio em tempo real (BRT)
    function atualizarRelogio() {
        const agora = new Date();
        const fHora = { timeZone: 'America/Sao_Paulo', hour: '2-digit', minute: '2-digit', second: '2-digit' };
        const fData = { timeZone: 'America/Sao_Paulo', day: '2-digit', month: '2-digit', year: 'numeric' };
        document.getElementById('live-clock').innerText = agora.toLocaleDateString('pt-BR', fData) + " • " + agora.toLocaleTimeString('pt-BR', fHora) + " (BRT)";
    }
    setInterval(atualizarRelogio, 1000); 
    atualizarRelogio();

    // 2. Consome o arquivo data.json gerado pelo seu scrape.py
    async function carregarDados() {
        const container = document.getElementById('conteudo-dinamico');
        try {
            // Adiciona um timestamp na URL para evitar que o navegador use o cache antigo
            const resposta = await fetch('data.json?t=' + new Date().getTime());
            if (!resposta.ok) throw new Error('Não foi possível carregar o arquivo data.json');
            
            const dados = await resposta.json();
            
            // Se o seu JSON estruturar o texto em uma chave específica (ex: dados.conteudo ou dados.texto), mude aqui.
            // Caso ele seja um objeto com várias chaves, abaixo vamos varrer e exibir tudo de forma limpa.
            if (typeof dados === 'object') {
                let htmlGerado = "";
                for (const [chave, valor] of Object.entries(dados)) {
                    if (valor) {
                        htmlGerado += `<div style="margin-bottom: 25px;">
                            <h3 style="color: var(--azul-trade); text-transform: uppercase; font-size: 14px; margin-bottom: 8px; border-left: 3px solid var(--azul-trade); padding-left: 8px;">${chave.replace(/_/g, ' ')}</h3>
                            <p style="margin: 0; color: #e5e7eb;">${valor}</p>
                        </div>`;
                    }
                }
                container.innerHTML = htmlGerated || "Nenhum dado legível encontrado dentro do JSON.";
            } else {
                container.innerHTML = dados;
            }
        } catch (erro) {
            console.error(erro);
            container.innerHTML = `<div class="erro-mensagem">
                <strong>⚠️ Erro ao renderizar dados:</strong><br>
                O arquivo 'data.json' ainda não foi gerado nesta sessão ou possui um formato inválido. Certifique-se de que o workflow de atualização rodou por completo.
            </div>`;
        }
    }
    carregarDados();
</script>
</body>
</html>
