<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Morning Call · B3 Daytrade</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:radial-gradient(circle at 10% 20%,#0a0f1e,#03060c);font-family:'Inter',sans-serif;color:#eef2ff;padding:1.5rem;min-height:100vh}
        .dashboard{max-width:1400px;margin:0 auto}
        .hero{background:linear-gradient(135deg,#0f172a,#1e1b4b);border-radius:32px;padding:24px 32px;margin-bottom:32px;border:1px solid rgba(56,189,248,0.3)}
        .hero h1{font-size:2rem;background:linear-gradient(135deg,#fff,#38bdf8,#a855f7);-webkit-background-clip:text;background-clip:text;color:transparent}
        .badge{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px}
        .badge span{background:#1e293b;padding:6px 14px;border-radius:40px;font-size:0.8rem}
        .live{background:#0f212e;border-left:3px solid #10b981;padding:6px 14px;border-radius:40px}
        .live i{color:#10b981;animation:pulse 1.2s infinite}
        @keyframes pulse{0%{opacity:0.5}100%{opacity:1}}
        .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}
        .card{background:rgba(15,23,42,0.7);backdrop-filter:blur(10px);border-radius:28px;border:1px solid rgba(56,189,248,0.2);overflow:hidden}
        .card-header{padding:18px 24px;background:rgba(0,0,0,0.3);border-bottom:1px solid #1e293b;font-weight:600;display:flex;align-items:center;gap:10px}
        .card-header i{color:#38bdf8}
        .chart-container{padding:20px;height:320px}
        iframe{width:100%;height:100%;border:none;border-radius:16px}
        .agenda{background:#0f172a;border-radius:20px;padding:16px;margin-bottom:24px}
        .agenda-item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1e293b}
        .agenda-time{font-weight:600;color:#38bdf8}
        .section{background:#0f172a;border-radius:20px;padding:20px;margin-bottom:20px}
        .section-title{font-size:1.2rem;font-weight:700;margin-bottom:12px;border-left:4px solid #38bdf8;padding-left:12px}
        .section-content{font-size:0.95rem;line-height:1.5;color:#cbd5e1}
        .footer{text-align:center;margin-top:32px;font-size:0.7rem;color:#475569;border-top:1px solid #1e293b;padding-top:20px}
        @media (max-width:800px){.grid-2{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div class="dashboard">
    <div class="hero">
        <h1><i class="fas fa-chart-line"></i> Morning Call · B3 Daytrade</h1>
        <div class="badge">
            <span><i class="fas fa-chart-line"></i> Mini Índice (WIN)</span>
            <span><i class="fas fa-dollar-sign"></i> Mini Dólar (WDO)</span>
            <div class="live"><i class="fas fa-circle"></i> Atualizado via JSON</div>
        </div>
    </div>

    <div class="grid-2">
        <div class="card"><div class="card-header"><i class="fas fa-chart-simple"></i> Mini Índice Futures · WINJ26</div><div class="chart-container"><iframe src="https://br.tradingview.com/chart/WINJ26/?symbol=BMFBOVESPA%3AWINJ26"></iframe></div></div>
        <div class="card"><div class="card-header"><i class="fas fa-chart-line"></i> Mini Dólar Futures · WDOJ26</div><div class="chart-container"><iframe src="https://br.tradingview.com/chart/WDOJ26/?symbol=BMFBOVESPA%3AWDOJ26"></iframe></div></div>
    </div>

    <div class="agenda" id="agenda"></div>

    <div id="conteudo"></div>

    <div class="footer">
        <i class="fas fa-sync-alt"></i> Dados atualizados manualmente via <strong>editor.html</strong><br>
        Última atualização: <span id="lastUpdate">--</span>
    </div>
</div>

<script>
    async function carregarDados() {
        try {
            const res = await fetch('data.json?v=' + Date.now());
            if (!res.ok) throw new Error();
            const data = await res.json();
            document.getElementById('lastUpdate').innerText = data.lastUpdate || '--';
            // Agenda
            let agendaHtml = '<div class="section-title"><i class="fas fa-calendar"></i> Agenda de Indicadores</div>';
            if (data.agenda && data.agenda.length) {
                data.agenda.forEach(item => {
                    agendaHtml += `<div class="agenda-item"><span class="agenda-time">${item.time}</span><span>${item.event}</span></div>`;
                });
            } else {
                agendaHtml += '<div>Nenhum evento programado</div>';
            }
            document.getElementById('agenda').innerHTML = agendaHtml;
            // Seções (Brasil, EUA, Europa, Ásia)
            let conteudoHtml = '';
            const secoes = ['brasil', 'eua', 'europa', 'asia'];
            secoes.forEach(sec => {
                if (data[sec] && data[sec].trim() !== '') {
                    conteudoHtml += `
                        <div class="section">
                            <div class="section-title">${sec.toUpperCase()}</div>
                            <div class="section-content">${data[sec].replace(/\n/g, '<br>')}</div>
                        </div>
                    `;
                }
            });
            document.getElementById('conteudo').innerHTML = conteudoHtml;
        } catch(e) {
            document.getElementById('conteudo').innerHTML = '<div class="section" style="background:#ff000022;">Erro: data.json não encontrado. Use o editor.html para criar.</div>';
        }
    }
    carregarDados();
    setInterval(carregarDados, 300000);
</script>
</body>
</html>
